<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>드림틴즈 출석체크</title>
<style>
  :root {
    --primary:#7C3AED;--primary-lt:#EDE9FE;--primary-dark:#6D28D9;
    --green:#16A34A;--green-lt:#F0FDF4;
    --amber:#D97706;--amber-lt:#FFFBEB;
    --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
    --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-800:#1F2937;
    --radius:18px;--radius-sm:10px;
    --font:'Pretendard','Noto Sans KR',sans-serif;
    --shadow:0 6px 28px rgba(124,58,237,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:var(--font);background:linear-gradient(160deg,#EDE9FE 0%,#F5F3FF 40%,#F0FDF4 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
  .card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 22px;width:100%;max-width:400px;}
  .logo{text-align:center;margin-bottom:24px;}
  .logo-icon{font-size:2.8rem;display:block;margin-bottom:6px;}
  .logo-title{font-size:1.3rem;font-weight:800;color:var(--gray-800);}
  .logo-sub{font-size:.76rem;color:var(--gray-400);margin-top:3px;}
  /* 타입 선택 버튼 */
  .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .type-btn{padding:18px 12px;border:2px solid var(--gray-200);border-radius:14px;background:#fff;font-family:var(--font);cursor:pointer;text-align:center;transition:all .18s;}
  .type-btn .icon{font-size:2rem;display:block;margin-bottom:8px;}
  .type-btn .label{font-size:.9rem;font-weight:700;color:var(--gray-700);}
  .type-btn .desc{font-size:.7rem;color:var(--gray-400);margin-top:3px;}
  .type-btn.sel-new{border-color:#F59E0B;background:#FFFBEB;}
  .type-btn.sel-reg{border-color:var(--primary);background:var(--primary-lt);}
  .type-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08);}
  /* 입력 */
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:.78rem;font-weight:700;color:var(--gray-600);margin-bottom:5px;}
  input[type=text],input[type=number]{width:100%;padding:14px 15px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:var(--font);font-size:1rem;color:var(--gray-800);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
  input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,58,237,.1);}
  input::placeholder{color:var(--gray-400);}
  /* 학년 선택 그리드 */
  .grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px;}
  .sel-btn{padding:11px 4px;border:1.5px solid var(--gray-200);border-radius:8px;background:#fff;font-family:var(--font);font-size:.82rem;font-weight:600;color:var(--gray-600);cursor:pointer;text-align:center;transition:all .15s;}
  .sel-btn:hover{border-color:var(--primary);color:var(--primary);}
  .sel-btn.sel{border-color:var(--primary);background:var(--primary);color:#fff;}
  /* 버튼 */
  .btn{width:100%;padding:15px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:1rem;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover:not(:disabled){background:var(--primary-dark);}
  .btn-primary:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;}
  .btn-amber{background:#D97706;color:#fff;}
  .btn-amber:hover:not(:disabled){background:#B45309;}
  .btn-amber:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover:not(:disabled){background:#15803D;}
  .btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--primary);}
  .btn-outline:hover{background:var(--primary-lt);}
  /* 날짜 칩 */
  .date-chip{display:inline-flex;align-items:center;gap:5px;background:var(--primary-lt);border:1px solid rgba(124,58,237,.2);border-radius:20px;padding:5px 13px;font-size:.78rem;font-weight:700;color:var(--primary);}
  /* 성공 */
  .success-wrap{text-align:center;}
  .success-icon{font-size:4.5rem;display:block;margin:8px 0;animation:pop .45s cubic-bezier(.175,.885,.32,1.275);}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  .success-title{font-size:1.25rem;font-weight:800;margin-bottom:4px;}
  .success-detail{border-radius:var(--radius-sm);padding:14px 16px;margin:14px 0;text-align:left;}
  .success-detail .row{display:flex;justify-content:space-between;padding:4px 0;font-size:.85rem;}
  .success-detail .row+.row{border-top:1px solid rgba(255,255,255,.3);margin-top:3px;padding-top:7px;}
  /* 오류 */
  .err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--radius-sm);padding:10px 14px;font-size:.82rem;color:#DC2626;margin-top:8px;display:none;}
  .err-box.show{display:block;}
  /* 로딩 */
  .loading-wrap{text-align:center;padding:24px;color:var(--gray-400);font-size:.85rem;}
  .spin{display:inline-block;animation:spin 1s linear infinite;font-size:1.2rem;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tip{font-size:.72rem;color:var(--gray-400);text-align:center;margin-top:6px;}
  .gap{height:10px;} .gap-sm{height:6px;}
  .section-title{font-size:.8rem;font-weight:700;color:var(--gray-600);margin-bottom:8px;}
  .hint-chip{display:inline-flex;align-items:center;gap:3px;background:var(--amber-lt);border:1px solid #FCD34D;border-radius:12px;padding:3px 9px;font-size:.68rem;font-weight:600;color:var(--amber);}
</style>
</head>
<body>
<div class="card" id="app">
  <div class="loading-wrap"><span class="spin">⏳</span><br>로딩 중...</div>
</div>

<script>
// ════════════════════════════════════════════════════════
// ⚙️ 설정: 교사용 앱과 동일한 GAS 배포 URL을 붙여넣으세요
// ════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyMa_Gk0KQNnyLugZJy9X9N0gEeyd3Hw2aD-SR05YLksm1h7b69DX8awWQcdBauI47VIg/exec';  // 예: 'https://script.google.com/macros/s/xxxx/exec'

// 앱 상태
const S = {
  type: '',          // 'new' | 'reg'
  sundayDate: '',
  sundayLabel: '',
  grades: [],
  selGrade: '',
  selClass: '',
  nameInput: '',
  bdInput: '',       // 새친구용 생년월일 6자리
  resultClass: '',
};

// ════════════════════════════════════════════════════════
// GAS 통신 (JSONP - CORS 우회)
// ════════════════════════════════════════════════════════
function callGAS(action, payload = {}) {
  return new Promise((resolve) => {
    if (!GAS_URL) { resolve({ success: false, message: 'GAS_URL을 설정해주세요.' }); return; }
    const cbName = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    const timer = setTimeout(() => {
      cleanup(); resolve({ success: false, message: '연결 시간 초과. GAS URL을 확인해주세요.' });
    }, 20000);
    function cleanup() {
      clearTimeout(timer); delete window[cbName];
      const s = document.getElementById(cbName); if (s) s.remove();
    }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    const params = new URLSearchParams({ action, payload: JSON.stringify(payload), callback: cbName });
    const script = document.createElement('script');
    script.id = cbName;
    script.src = GAS_URL + '?' + params.toString();
    script.onerror = () => { cleanup(); resolve({ success: false, message: 'GAS에 연결할 수 없습니다.' }); };
    document.head.appendChild(script);
  });
}

// ════════════════════════════════════════════════════════
// 초기화
// ════════════════════════════════════════════════════════
async function init() {
  if (!GAS_URL) { render('error_config'); return; }
  setLoading('정보 불러오는 중...');
  try {
    const [gradeRes, sunRes] = await Promise.all([
      callGAS('getGradeList'),
      callGAS('getNearestSunday'),
    ]);
    if (!gradeRes.success) throw new Error(gradeRes.message || '학년 목록 오류');
    S.grades = gradeRes.data || [];
    S.sundayDate  = sunRes.success ? sunRes.data : '';
    S.sundayLabel = S.sundayDate ? fmtDate(S.sundayDate) : '이번 주 주일';
    render('step1');
  } catch(e) { render('error', e.message); }
}

// ════════════════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════════════════
function setLoading(msg) {
  document.getElementById('app').innerHTML =
    `<div class="loading-wrap"><span class="spin">⏳</span><br>${msg||'처리 중...'}</div>`;
}
function render(view, extra) {
  const views = { step1, formNew, formReg, formNewInfo, success_new, success_reg, already, error_config, error };
  document.getElementById('app').innerHTML = (views[view] || (() => ''))(extra);
}

function logoHtml() {
  return `<div class="logo">
    <span class="logo-icon">✝️</span>
    <div class="logo-title">드림틴즈 출석체크</div>
    <div class="logo-sub">📅 ${S.sundayLabel}</div>
  </div>`;
}

// ══ Step 1: 유형 선택 ────────────────────────────────────
function step1() {
  return `
    ${logoHtml()}
    <div style="text-align:center;margin-bottom:16px;">
      <span class="date-chip">📅 ${S.sundayLabel}</span>
    </div>
    <div class="section-title">오늘 처음 오셨나요?</div>
    <div class="type-grid">
      <button class="type-btn" onclick="selectType('new')">
        <span class="icon">👋</span>
        <span class="label">새친구</span>
        <span class="desc">처음 방문한 분</span>
      </button>
      <button class="type-btn" onclick="selectType('reg')">
        <span class="icon">😊</span>
        <span class="label">등록친구</span>
        <span class="desc">이미 등록된 분</span>
      </button>
    </div>
    <div class="tip">출석 기록이 교사 앱에 자동 반영됩니다</div>`;
}

function selectType(type) {
  S.type = type;
  render(type === 'new' ? 'formNew' : 'formReg');
}

// ══ 새친구 폼 ──────────────────────────────────────────
function formNew() {
  return `
    ${logoHtml()}
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px;">
      <span style="font-size:1.3rem;">👋</span>
      <span style="font-size:.9rem;font-weight:800;color:#D97706;">새친구 출석 등록</span>
      <span class="hint-chip">처음 방문</span>
    </div>
    <div class="field">
      <label>생년월일 <span style="color:var(--amber);font-size:.7rem;">(6자리 숫자, 예: 120309)</span></label>
      <input type="text" id="bdInput" maxlength="6" placeholder="YYMMDD (예: 120309)"
        inputmode="numeric" value="${S.bdInput}"
        oninput="S.bdInput=this.value.replace(/\D/g,'').slice(0,6);toggleSubmitBtn('newSubmitBtn');">
    </div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="nameInputNew" placeholder="이름을 입력하세요"
        value="${S.nameInput}"
        oninput="S.nameInput=this.value.trim();toggleSubmitBtn('newSubmitBtn');"
        onkeydown="if(event.key==='Enter')submitNew()">
    </div>
    <div class="gap"></div>
    <button class="btn btn-amber" id="newSubmitBtn" onclick="submitNew()"
      ${!S.bdInput||S.bdInput.length<6||!S.nameInput?'disabled':''}>
      ✋ 출석하기
    </button>
    <div class="gap-sm"></div>
    <button class="btn btn-outline" onclick="goBack()">← 뒤로</button>
    <div id="err" class="err-box"></div>`;
}

function toggleSubmitBtn(id) {
  const btn = document.getElementById(id);
  if (!btn) return;
  if (id === 'newSubmitBtn') {
    btn.disabled = !S.bdInput || S.bdInput.length < 6 || !S.nameInput;
  } else {
    btn.disabled = !S.nameInput;
  }
}

async function submitNew(extraInfo) {
  const bd = S.bdInput.trim();
  const nm = S.nameInput.trim();
  if (bd.length < 6 || !nm) return;

  // 중복 제출 방지
  if (S._submitting) return;
  S._submitting = true;

  const btn = document.getElementById('newSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 처리 중...'; }

  const payload = { name: nm, birthday: bd, date: S.sundayDate };
  if (extraInfo) payload.extra = extraInfo;

  const r = await callGAS('saveNewbieAttendance', payload);
  S._submitting = false;

  if (r.success) {
    if (r.data && r.data.alreadyChecked) { render('already'); return; }
    S.resultClass = r.data && r.data.isNew ? 'new' : '';
    render('success_new');
  } else if (r.needsInfo) {
    // 추가 정보 입력 폼 표시
    render('formNewInfo');
    if (btn) { btn.disabled = false; btn.textContent = '✋ 출석하기'; }
  } else {
    showErr(r.message || '오류가 발생했습니다.');
    if (btn) { btn.disabled = false; btn.textContent = '✋ 출석하기'; }
  }
}


// ══ 새친구 추가 정보 입력 폼 ─────────────────────────────
function formNewInfo() {
  return `
    ${logoHtml()}
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <span style="font-size:1.3rem;">👋</span>
      <span style="font-size:.9rem;font-weight:800;color:var(--primary);">새친구 등록</span>
    </div>
    <div style="background:#FEF9C3;border:1.5px solid #FDE047;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:.8rem;color:#92400E;">
      📋 새친구 등록을 위한 추가 정보를 입력해주세요.<br>
      <span style="font-size:.73rem;color:#78350F;">입력 후 출석이 함께 처리됩니다.</span>
    </div>
    <div class="field">
      <label>이름</label>
      <input type="text" value="${S.nameInput}" readonly style="background:var(--gray-100);color:var(--gray-500);">
    </div>
    <div class="field">
      <label>생년월일</label>
      <input type="text" value="${S.bdInput}" readonly style="background:var(--gray-100);color:var(--gray-500);">
    </div>
    <div class="field">
      <label>성별</label>
      <div style="display:flex;gap:8px;">
        <button class="sel-btn${S._newGender==='남'?' sel':''}" onclick="S._newGender='남';render('formNewInfo')" style="flex:1;">남</button>
        <button class="sel-btn${S._newGender==='여'?' sel':''}" onclick="S._newGender='여';render('formNewInfo')" style="flex:1;">여</button>
      </div>
    </div>
    <div class="field">
      <label>학교</label>
      <input type="text" id="newSchool" placeholder="학교명 (선택)" value="${S._newSchool||''}"
        oninput="S._newSchool=this.value.trim()">
    </div>
    <div class="field">
      <label>본인 연락처 <span style="color:var(--gray-400);font-size:.7rem;">(선택)</span></label>
      <input type="tel" id="newPhone" placeholder="010-0000-0000" value="${S._newPhone||''}"
        oninput="S._newPhone=this.value.trim()">
    </div>
    <div class="field">
      <label>학부모 연락처(부) <span style="color:var(--gray-400);font-size:.7rem;">(선택)</span></label>
      <input type="tel" id="newParentFa" placeholder="010-0000-0000" value="${S._newParentFa||''}"
        oninput="S._newParentFa=this.value.trim()">
    </div>
    <div class="field">
      <label>학부모 연락처(모) <span style="color:var(--gray-400);font-size:.7rem;">(선택)</span></label>
      <input type="tel" id="newParentMo" placeholder="010-0000-0000" value="${S._newParentMo||''}"
        oninput="S._newParentMo=this.value.trim()">
    </div>
    <div class="field">
      <label>주소 <span style="color:var(--gray-400);font-size:.7rem;">(선택)</span></label>
      <input type="text" id="newAddress" placeholder="주소를 입력하세요" value="${S._newAddress||''}"
        oninput="S._newAddress=this.value.trim()">
    </div>
    <div class="gap"></div>
    <button class="btn btn-amber" id="newInfoSubmitBtn" onclick="submitNewInfo()">
      ✋ 등록 + 출석하기
    </button>
    <div class="gap-sm"></div>
    <button class="btn btn-outline" onclick="render('formNew')">← 뒤로</button>
    <div id="err" class="err-box"></div>`;
}

async function submitNewInfo() {
  const btn = document.getElementById('newInfoSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 처리 중...'; }
  await submitNew({
    gender:   S._newGender   || '',
    school:   S._newSchool   || '',
    phone:    S._newPhone    || '',
    parentFa: S._newParentFa || '',
    parentMo: S._newParentMo || '',
    address:  S._newAddress  || '',
  });
}

// ══ 등록친구 폼 ──────────────────────────────────────────
function formReg() {
  const gradeBtns = S.grades.map(g =>
    `<button class="sel-btn${g===S.selGrade?' sel':''}" onclick="selectGrade('${g}')">${g}</button>`
  ).join('');

  return `
    ${logoHtml()}
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px;">
      <span style="font-size:1.3rem;">😊</span>
      <span style="font-size:.9rem;font-weight:800;color:var(--primary);">등록친구 출석</span>
    </div>
    <div class="field">
      <label>학년 <span style="color:var(--gray-400);font-size:.7rem;">(반은 선택사항)</span></label>
      <div class="grade-grid">${gradeBtns}</div>
      ${S.selGrade ? `
      <input type="text" id="classInput" placeholder="반 입력 (선택, 예: 1반 또는 중1-1반)"
        value="${S.selClass}"
        oninput="S.selClass=this.value.trim();"
        style="margin-top:6px;font-size:.88rem;">
      ` : ''}
    </div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="nameInputReg" placeholder="이름을 입력하세요"
        value="${S.nameInput}"
        oninput="S.nameInput=this.value.trim();toggleSubmitBtn('regSubmitBtn');"
        onkeydown="if(event.key==='Enter')submitReg()">
    </div>
    <div class="gap"></div>
    <button class="btn btn-primary" id="regSubmitBtn" onclick="submitReg()"
      ${!S.selGrade||!S.nameInput?'disabled':''}>
      ✅ 출석하기
    </button>
    <div class="gap-sm"></div>
    <button class="btn btn-outline" onclick="goBack()">← 뒤로</button>
    <div id="err" class="err-box"></div>`;
}

function selectGrade(g) {
  S.selGrade = g; S.selClass = '';
  render('formReg');
  // 이름 입력창 포커스
  setTimeout(() => {
    const n = document.getElementById('nameInputReg');
    if (n) n.focus();
  }, 100);
}

async function submitReg() {
  if (!S.selGrade || !S.nameInput) return;
  // 중복 제출 방지
  if (S._submitting) return;
  S._submitting = true;
  // 반 입력 처리: "1반" → "중1-1반" 자동 완성 시도
  const rawClass = S.selClass;
  let resolvedClass = '';
  if (rawClass) {
    // "1반"처럼 학년 없이 반만 입력한 경우
    if (/^\d반$/.test(rawClass)) {
      resolvedClass = S.selGrade + '-' + rawClass;
    } else if (rawClass.includes(S.selGrade)) {
      resolvedClass = rawClass; // 이미 학년 포함
    } else {
      resolvedClass = S.selGrade + '-' + rawClass;
    }
  }

  const btn = document.getElementById('regSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 처리 중...'; }

  const r = await callGAS('saveStudentSelfAttendanceByGrade', {
    grade: S.selGrade,
    classGroup: resolvedClass,
    name: S.nameInput,
    date: S.sundayDate,
  });

  if (r.success) {
    if (r.data && r.data.alreadyChecked) { render('already'); return; }
    S.resultClass = (r.data && r.data.classGroup) || resolvedClass || S.selGrade;
    render('success_reg');
  } else if (r.needClass) {
    // 동명이인 처리: 반 선택 버튼 표시
    const clsBtns = (r.classes||[]).map(c =>
      `<button class="sel-btn" style="margin:3px;" onclick="pickDuplClass('${c}')">${c}</button>`
    ).join('');
    showErr(`동명이인이 있습니다. 반을 선택해주세요:<br><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">${clsBtns}</div>`);
    if (btn) { btn.disabled = false; btn.textContent = '✅ 출석하기'; }
  } else {
    S._submitting = false;
    showErr(r.message || '오류가 발생했습니다.');
    if (btn) { btn.disabled = false; btn.textContent = '✅ 출석하기'; }
  }
}

async function pickDuplClass(cls) {
  S.selClass = cls;
  render('formReg');
  setTimeout(submitReg, 100);
}

// ══ 유틸 ────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  const [y,m,dy] = d.split('-');
  const days = ['일','월','화','수','목','금','토'];
  const date = new Date(+y,+m-1,+dy);
  return `${+m}월 ${+dy}일 (${days[date.getDay()]})`;
}

function showErr(msg) {
  const el = document.getElementById('err');
  if (!el) return;
  el.innerHTML = msg;
  el.classList.add('show');
}

function goBack() {
  S.nameInput = ''; S.bdInput = ''; S.selGrade = ''; S.selClass = '';
  render('step1');
}

function resetApp() {
  Object.assign(S, { type:'', nameInput:'', bdInput:'', selGrade:'', selClass:'', resultClass:'' });
  render('step1');
}
